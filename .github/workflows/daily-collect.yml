name: Daily AI Digest

on:
  # 毎日 JST 7:00 (UTC 22:00前日) に実行
  schedule:
    - cron: '0 22 * * *'

  # 手動実行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-report:
    environment: gemini
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run collection script
        env:
          # Environment secret "GEMINI" を GEMINI_API_KEY として渡す
          GEMINI_API_KEY: ${{ secrets.GEMINI }}
          # Claude (config.yamlでprovider: claudeに切替時)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GitHub API
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/collect.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "No new reports to commit."
          else
            DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            git commit -m "📰 Daily AI Digest: ${DATE}"
            git push
            echo "Report committed and pushed."
          fi
